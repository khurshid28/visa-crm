services:
  # Bir martalik: Prisma client generatsiya + bazaga jadval push. Tugagach o'chadi.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visa-crm-migrate
    command: sh -c "npx prisma generate && npx prisma db push --accept-data-loss"
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://root:khurshid-2827@mysql:3306/visa_crm_db
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visa-crm-app
    command: npm run dev
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://root:khurshid-2827@mysql:3306/visa_crm_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      BOOKING_PROFILE_DIR: /profiles
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - order_profiles:/profiles
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visa-crm-bot
    command: npm run bot
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://root:khurshid-2827@mysql:3306/visa_crm_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      BOOKING_PROFILE_DIR: /profiles
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - order_profiles:/profiles
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  # 10 ta parallel Playwright worker. Har bir replica'ning HOSTNAME'i noyob —
  # u worker profil nomi sifatida ishlatiladi. Profil papkasi esa user (gmail)
  # bo'yicha /profiles ichida saqlanadi (cookies/localStorage barqaror).
  order-worker:
    build:
      context: .
      dockerfile: Dockerfile
    # Xvfb virtual ekran (Turnstile interaktiv checkbox uchun) — pastdagi
    # entrypoint Xvfb ochib, so'ng worker'ni ishga tushiradi.
    entrypoint: ["sh", "/app/docker-entrypoint.sh"]
    command: npm run worker:order
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://root:khurshid-2827@mysql:3306/visa_crm_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      BOOKING_PROFILE_DIR: /profiles
      ORDER_WORKER_PREFETCH: 1
      # CDP rejimi (Turnstile/Cloudflare) — real Google Chrome (Dockerfile o'rnatadi).
      BOOKING_CHROME_CDP: "true"
      BOOKING_CHROME_PATH: /usr/bin/google-chrome
      # Xvfb + NON-headless + OS-klik (login Turnstile interaktiv bo'lsa xdotool).
      BOOKING_XVFB: "true"
      DISPLAY: ":99"
      BOOKING_HEADLESS: "false"
      BOOKING_OS_CLICK: "true"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - order_profiles:/profiles
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      replicas: 10

  # Kalendar monitoring job (alohida modul). Doim ishlaydi: har 10 minutda
  # faol slotlarning appointment sahifasini ochib, bo'sh kun bor-yo'qligini
  # aniqlaydi (PROXY_ENABLED=true bo'lsa rotating IP orqali). Bo'sh kun topilsa
  # shu slot guruhlarini order navbatiga yuboradi. Bitta replica yetarli.
  slot-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visa-crm-slot-worker
    # Xvfb virtual ekranni ochib, so'ng worker'ni ishga tushiramiz (Turnstile
    # interaktiv checkbox uchun NON-headless Chrome + xdotool OS-klik kerak).
    entrypoint: ["sh", "/app/docker-entrypoint.sh"]
    command: npm run worker:slot
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://root:khurshid-2827@mysql:3306/visa_crm_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      BOOKING_PROFILE_DIR: /profiles
      SLOT_WORKER_INTERVAL_MS: 600000
      # CDP rejimi (Turnstile/Cloudflare) — real Google Chrome (Dockerfile o'rnatadi).
      BOOKING_CHROME_CDP: "true"
      BOOKING_CHROME_PATH: /usr/bin/google-chrome
      # Xvfb + NON-headless + OS-klik: interaktiv Turnstile checkbox chiqsa, uni
      # haqiqiy kursor (xdotool) bilan bosamiz. CDP auto-pass baribir birinchi
      # sinaladi; OS-klik faqat token kelmaganda (interaktiv) ishga tushadi.
      BOOKING_XVFB: "true"
      DISPLAY: ":99"
      BOOKING_HEADLESS: "false"
      BOOKING_OS_CLICK: "true"
      # Slot-monitor token/sessiyasi doimiy volume'da saqlansin (qayta login kam).
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  # Gmail aktivatsiya listener (alohida microservice). Doim ishlaydi: har
  # MAIL_WORKER_INTERVAL_MS (default 60s) da register tugagan, lekin hali
  # aktivlashmagan arizachilarni oladi (activationStatus pending/failed,
  # registerFinishedAt > MAIL_WORKER_STALE_MIN eski — inline aktivatsiya bilan
  # to'qnashmaslik uchun). Gmail qutidan aktivatsiya xatini QISQA kutadi; xat
  # kelsa linkni userning register profilida (sticky IP) ochib, 'activated'
  # qiladi. IMAP sozlanmagan bo'lsa bo'sh aylanadi. Bitta replica yetarli.
  mail-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visa-crm-mail-worker
    # Aktivatsiya linki register profilida ochiladi — order/slot worker bilan
    # bir xil brauzer yo'li (Xvfb + real Chrome) ishlatiladi.
    entrypoint: ["sh", "/app/docker-entrypoint.sh"]
    command: npm run worker:mail
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://root:khurshid-2827@mysql:3306/visa_crm_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      BOOKING_PROFILE_DIR: /profiles
      # Sikl oralig'i va inline aktivatsiya bilan to'qnashmaslik chegarasi.
      MAIL_WORKER_INTERVAL_MS: 60000
      MAIL_WORKER_STALE_MIN: 5
      MAIL_WORKER_LOOKBACK_HOURS: 48
      MAIL_WORKER_CONCURRENCY: 2
      MAIL_WORKER_MAIL_WAIT_MS: 8000
      # CDP rejimi — register profili real Google Chrome bilan ochiladi.
      BOOKING_CHROME_CDP: "true"
      BOOKING_CHROME_PATH: /usr/bin/google-chrome
      # Register profili bilan bir xil session (Xvfb + non-headless).
      BOOKING_XVFB: "true"
      DISPLAY: ":99"
      BOOKING_HEADLESS: "false"
      BOOKING_OS_CLICK: "true"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - order_profiles:/profiles
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.0
    container_name: visa-crm-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: khurshid-2827
      MYSQL_DATABASE: visa_crm_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pkhurshid-2827"]
      interval: 10s
      timeout: 5s
      retries: 15

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: visa-crm-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: visa-crm-redis
    ports:
      - "6379:6379"

volumes:
  app_node_modules:
  order_profiles:
  mysql_data:
